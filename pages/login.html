<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evidence | Authentication</title>

    <!-- CSS Base -->
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/style.css">

    <!-- Firebase SDKs (versão 10.7.0) -->
    <script type="module">
        // ==========================================
        // IMPORTAÇÕES DO FIREBASE
        // ==========================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        // ==========================================
        // CONFIGURAÇÃO DO FIREBASE (SEU PROJETO)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBSbWRG7KmegD0k1HsrQFZ39P02EQRmN9c",
            authDomain: "evidence-ac9ad.firebaseapp.com",
            projectId: "evidence-ac9ad",
            storageBucket: "evidence-ac9ad.firebasestorage.app",
            messagingSenderId: "641531112105",
            appId: "1:641531112105:web:b3700a206e74b227c557b8"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // ==========================================
        // ELEMENTOS DA TELA
        // ==========================================
        const loginBtn = document.getElementById('googleLogin');
        const logoutBtn = document.getElementById('googleLogout');
        const userInfo = document.getElementById('userInfo');
        const userName = document.getElementById('userName');
        const userEmail = document.getElementById('userEmail');
        const userAvatar = document.getElementById('userAvatar');
        const goToDesktop = document.getElementById('goToDesktop');
        const loading = document.getElementById('loading');

        // ==========================================
        // FUNÇÃO: LOGIN COM GOOGLE
        // ==========================================
        async function loginWithGoogle() {
            try {
                loading.style.display = 'block';
                loginBtn.disabled = true;
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                showUser(user);
            } catch (error) {
                console.error('Erro no login:', error);
                alert('Erro ao fazer login. Tente novamente.');
            } finally {
                loading.style.display = 'none';
                loginBtn.disabled = false;
            }
        }

        // ==========================================
        // FUNÇÃO: LOGOUT
        // ==========================================
        async function logout() {
            try {
                await signOut(auth);
                showLoggedOut();
            } catch (error) {
                console.error('Erro ao sair:', error);
            }
        }

        // ==========================================
        // FUNÇÃO: MOSTRAR USUÁRIO LOGADO
        // ==========================================
        function showUser(user) {
            loginBtn.style.display = 'none';
            logoutBtn.style.display = 'inline-flex';
            userInfo.style.display = 'block';
            userName.textContent = user.displayName || 'Usuário';
            userEmail.textContent = user.email;
            userAvatar.textContent = user.displayName ? user.displayName.charAt(0).toUpperCase() : 'U';
            goToDesktop.style.display = 'inline-flex';
        }

        // ==========================================
        // FUNÇÃO: MOSTRAR DESLOGADO
        // ==========================================
        function showLoggedOut() {
            loginBtn.style.display = 'inline-flex';
            logoutBtn.style.display = 'none';
            userInfo.style.display = 'none';
            goToDesktop.style.display = 'none';
        }

        // ==========================================
        // VERIFICAR ESTADO DE AUTENTICAÇÃO
        // ==========================================
        onAuthStateChanged(auth, (user) => {
            if (user) {
                showUser(user);
            } else {
                showLoggedOut();
            }
        });

        // ==========================================
        // EVENTOS DOS BOTÕES
        // ==========================================
        loginBtn.addEventListener('click', loginWithGoogle);
        logoutBtn.addEventListener('click', logout);

        // ==========================================
        // IR PARA O DESKTOP
        // ==========================================
        goToDesktop.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'desktop.html';
        });

        // ==========================================
        // PREVENIR SUBMISSÃO DO FORMULÁRIO
        // ==========================================
        document.querySelector('form')?.addEventListener('submit', (e) => {
            e.preventDefault();
        });
    </script>

    <!-- Estilos extras para o login -->
    <style>
        .login-panel .user-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--color-primary);
            color: white;
            font-size: var(--font-xl);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: var(--space-4) auto;
        }

        .login-panel .user-name {
            color: var(--text-bright);
            font-weight: 600;
        }

        .login-panel .user-email {
            color: var(--text-secondary);
            font-size: var(--font-sm);
        }

        .login-panel .logout-btn {
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--text-secondary);
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-md);
            font-size: var(--font-sm);
            cursor: pointer;
            transition: var(--transition-fast);
            margin-top: var(--space-2);
        }

        .login-panel .logout-btn:hover {
            border-color: var(--color-danger);
            color: var(--color-danger);
        }

        .login-panel .loading-spinner {
            display: none;
            margin: var(--space-3) auto;
        }

        .login-panel .loading-spinner::after {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <main class="hero">

        <section class="card login-panel fade-in">

            <div class="logo">EVIDENCE</div>

            <p class="badge badge-danger">RESTRICTED ACCESS</p>

            <h1>Security Terminal</h1>

            <p class="card-text">
                Autentique-se com sua conta Google para acessar
                o ambiente de investigação digital.
            </p>

            <!-- Avatar do usuário -->
            <div id="userInfo" style="display: none;">
                <div class="user-avatar" id="userAvatar">U</div>
                <p class="user-name" id="userName">Usuário</p>
                <p class="user-email" id="userEmail">email@exemplo.com</p>
                <button class="logout-btn" id="googleLogout" style="display: none;">
                    Sair
                </button>
            </div>

            <!-- Botão Login com Google -->
            <button id="googleLogin" class="btn btn-primary glow">
                🔑 Entrar com Google
            </button>

            <!-- Loading -->
            <div class="loading-spinner" id="loading"></div>

            <!-- Botão Acessar Desktop -->
            <a id="goToDesktop" href="#" class="btn btn-primary glow" style="display: none; margin-top: var(--space-4);">
                ▶ Acessar Desktop
            </a>

            <!-- Status do sistema -->
            <div class="system-status">
                <p>STATUS: <span class="status-online">ONLINE</span></p>
                <p>SERVER: EVIDENCE CORE</p>
                <p style="font-size: var(--font-xs); color: var(--text-muted); margin-top: var(--space-2);">
                    🔒 Autenticação via Google
                </p>
            </div>

        </section>

    </main>

</body>

</html>

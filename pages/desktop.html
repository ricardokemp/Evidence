<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evidence | Desktop</title>

    <!-- CSS Base -->
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/style.css">

    <style>
        /* ==========================================
           DESKTOP STYLES
           ========================================== */

        body {
            background: radial-gradient(ellipse at center, #0F172A 0%, #020617 100%);
            font-family: var(--font-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .desktop {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: var(--space-5);
            padding: var(--space-6);
            overflow-y: auto;
        }

        /* ==========================================
           PROGRESS BAR - TOPO
           ========================================== */

        .progress-container {
            position: fixed;
            top: var(--space-4);
            right: var(--space-4);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--space-3) var(--space-4);
            font-size: var(--font-sm);
            color: var(--text-secondary);
            z-index: var(--z-content);
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(8px);
            min-width: 160px;
            text-align: center;
        }

        .progress-container .label {
            display: block;
            font-size: var(--font-xs);
            color: var(--text-muted);
            margin-bottom: var(--space-1);
        }

        .progress-container .count {
            font-size: var(--font-xl);
            font-weight: 700;
            color: var(--text-bright);
        }

        .progress-container .count .total {
            color: var(--text-muted);
            font-weight: 400;
        }

        /* ==========================================
           MISSIONS PANEL - LATERAL
           ========================================== */

        .missions-panel {
            position: fixed;
            left: var(--space-4);
            top: var(--space-4);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--space-4) var(--space-5);
            z-index: var(--z-content);
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(8px);
            max-width: 280px;
            max-height: 70vh;
            overflow-y: auto;
            min-width: 200px;
        }

        .missions-panel h4 {
            color: var(--text-bright);
            font-size: var(--font-sm);
            font-weight: 600;
            margin-bottom: var(--space-3);
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: var(--space-2);
        }

        .missions-panel .mission-item {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-2);
            border-radius: var(--radius-sm);
            font-size: var(--font-xs);
            color: var(--text-secondary);
            transition: var(--transition-fast);
            margin-bottom: var(--space-1);
            cursor: default;
        }

        .missions-panel .mission-item .icon {
            font-size: var(--font-md);
            width: 24px;
            text-align: center;
        }

        .missions-panel .mission-item .status {
            font-size: var(--font-xs);
            color: var(--text-muted);
        }

        .missions-panel .mission-item.locked {
            opacity: 0.4;
            filter: grayscale(0.8);
        }

        .missions-panel .mission-item.active {
            border-left: 3px solid var(--color-primary);
            background: rgba(59, 130, 246, 0.05);
            color: var(--text-bright);
        }

        .missions-panel .mission-item.completed {
            color: var(--color-success);
        }

        .missions-panel .mission-item.completed .status {
            color: var(--color-success);
        }

        /* ==========================================
           NOTIFICATION
           ========================================== */

        .notification {
            position: fixed;
            top: var(--space-5);
            left: 50%;
            transform: translateX(-50%);
            background: var(--color-success);
            color: white;
            padding: var(--space-3) var(--space-5);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            z-index: var(--z-toast);
            font-weight: 600;
            display: none;
            animation: slideDown 0.5s ease forwards;
            text-align: center;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* ==========================================
           ICON
           ========================================== */

        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90px;
            padding: var(--space-3);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition-fast);
            text-align: center;
            color: var(--text-secondary);
            text-decoration: none;
            border: 1px solid transparent;
            position: relative;
        }

        .desktop-icon:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--color-border);
            transform: translateY(-4px);
        }

        .desktop-icon .icon {
            font-size: 48px;
            margin-bottom: var(--space-2);
            line-height: 1;
        }

        .desktop-icon .label {
            font-size: var(--font-xs);
            color: var(--text-secondary);
            max-width: 80px;
            word-wrap: break-word;
        }

        .desktop-icon .badge-count {
            background: var(--color-danger);
            color: white;
            font-size: 10px;
            font-weight: 700;
            border-radius: 50%;
            padding: 2px 6px;
            position: absolute;
            top: -5px;
            right: -5px;
            display: none;
        }

        .desktop-icon .unlock-badge {
            background: var(--color-success);
            color: white;
            font-size: 10px;
            font-weight: 700;
            border-radius: 50%;
            padding: 2px 6px;
            position: absolute;
            top: -5px;
            right: -5px;
            display: none;
        }

        /* ==========================================
           TASKBAR
           ========================================== */

        .taskbar {
            height: 56px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--space-4);
            flex-shrink: 0;
        }

        .taskbar .logo-small {
            font-size: var(--font-sm);
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-bright);
        }

        .taskbar .clock {
            font-family: var(--font-mono);
            font-size: var(--font-sm);
            color: var(--text-secondary);
        }

        .taskbar .taskbar-items {
            display: flex;
            gap: var(--space-2);
            align-items: center;
        }

        .taskbar-item {
            padding: var(--space-1) var(--space-3);
            border-radius: var(--radius-sm);
            font-size: var(--font-xs);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition-fast);
            border: 1px solid transparent;
        }

        .taskbar-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--color-border);
            color: var(--text-bright);
        }

        .taskbar-item.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--color-primary);
            color: var(--text-bright);
        }

        /* ==========================================
           WINDOW - CENTRALIZADA
           ========================================== */

        .window {
            position: fixed;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            width: 90%;
            max-width: 1100px;
            max-height: 85vh;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            z-index: var(--z-modal);
            display: none;
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn 0.25s ease forwards;
            margin: 0 !important;
            bottom: auto !important;
            right: auto !important;
        }

        .window.open {
            display: flex;
        }

        .window-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-3) var(--space-5);
            border-bottom: 1px solid var(--color-border);
            background: rgba(15, 23, 42, 0.5);
            flex-shrink: 0;
        }

        .window-header .title {
            font-size: var(--font-md);
            font-weight: 600;
            color: var(--text-bright);
        }

        .window-header .close-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: var(--font-xl);
            cursor: pointer;
            transition: var(--transition-fast);
            padding: 0 var(--space-2);
        }

        .window-header .close-btn:hover {
            color: var(--color-danger);
        }

        .window-body {
            padding: var(--space-6);
            overflow-y: auto;
            flex: 1;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
        }

        .window-body h3 {
            color: var(--text-bright);
            font-size: var(--font-lg);
            margin-bottom: var(--space-4);
        }

        .window-body p {
            margin-bottom: var(--space-2);
            line-height: 1.7;
        }

        .window-body .file-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }

        .window-body .file-item {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            transition: var(--transition-fast);
            cursor: pointer;
        }

        .window-body .file-item:hover {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-bright);
        }

        .window-body .file-item .icon {
            font-size: var(--font-lg);
        }

        .window-body .file-item .name {
            flex: 1;
        }

        .window-body .file-item .size {
            font-size: var(--font-xs);
            color: var(--text-muted);
        }

        .window-body .btn-secondary {
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--text-secondary);
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-md);
            font-size: var(--font-sm);
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .window-body .btn-secondary:hover {
            border-color: var(--color-primary);
            color: var(--text-bright);
        }

        .window-body .btn-primary {
            background: var(--color-primary);
            color: white;
            padding: var(--space-2) var(--space-5);
            border-radius: var(--radius-md);
            font-size: var(--font-sm);
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: var(--transition-fast);
        }

        .window-body .btn-primary:hover {
            background: var(--color-primary-hover);
            transform: translateY(-2px);
        }

        /* ==========================================
           IMAGEM
           ========================================== */

        .window-body .image-container {
            width: 100%;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-2);
            flex: 1;
        }

        .window-body .image-container img {
            max-width: 100%;
            max-height: 75vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: var(--radius-sm);
        }

        /* ==========================================
           VÍDEO
           ========================================== */

        .window-body .video-container {
            width: 100%;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-2);
            flex: 1;
        }

        .window-body .video-container video {
            max-width: 100%;
            max-height: 75vh;
            width: auto;
            height: auto;
            border-radius: var(--radius-sm);
        }

        /* ==========================================
           SCROLLBAR
           ========================================== */

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: var(--radius-full);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* ==========================================
           RESPONSIVIDADE
           ========================================== */

        @media (max-width: 1024px) {
            .missions-panel {
                max-width: 220px;
                padding: var(--space-3);
                left: var(--space-3);
                top: var(--space-3);
            }

            .missions-panel h4 {
                font-size: var(--font-xs);
            }

            .missions-panel .mission-item {
                font-size: 10px;
                padding: var(--space-1) var(--space-1);
            }

            .missions-panel .mission-item .icon {
                font-size: var(--font-sm);
                width: 20px;
            }
        }

        @media (max-width: 768px) {
            .desktop {
                gap: var(--space-3);
                padding: var(--space-3);
            }

            .desktop-icon {
                width: 72px;
                padding: var(--space-2);
            }

            .desktop-icon .icon {
                font-size: 36px;
            }

            .desktop-icon .label {
                font-size: 10px;
            }

            .taskbar .logo-small {
                display: none;
            }

            .window {
                width: 95%;
                max-height: 90vh;
                top: 50% !important;
                left: 50% !important;
                transform: translate(-50%, -50%) !important;
            }

            .window-body {
                padding: var(--space-3);
            }

            .window-header {
                padding: var(--space-2) var(--space-3);
            }

            .window-header .title {
                font-size: var(--font-sm);
            }

            .progress-container {
                top: var(--space-2);
                right: var(--space-2);
                padding: var(--space-2) var(--space-3);
                font-size: var(--font-xs);
                min-width: 120px;
            }

            .window-body .image-container {
                min-height: 200px;
            }

            .window-body .image-container img {
                max-height: 60vh;
            }

            .window-body .video-container {
                min-height: 200px;
            }

            .window-body .video-container video {
                max-height: 60vh;
            }

            .missions-panel {
                display: none;
            }

            .mobile-missions-toggle {
                display: flex !important;
            }
        }

        @media (max-width: 480px) {
            .progress-container {
                font-size: 10px;
                min-width: 80px;
                padding: var(--space-1) var(--space-2);
                top: var(--space-1);
                right: var(--space-1);
            }

            .progress-container .count {
                font-size: var(--font-lg);
            }

            .desktop-icon {
                width: 60px;
                padding: var(--space-1);
            }

            .desktop-icon .icon {
                font-size: 28px;
            }

            .desktop-icon .label {
                font-size: 8px;
            }

            .window {
                width: 98%;
                max-height: 95vh;
            }

            .window-body {
                padding: var(--space-2);
            }

            .window-body h3 {
                font-size: var(--font-md);
            }

            .window-body .file-item {
                padding: var(--space-1) var(--space-2);
                font-size: var(--font-xs);
            }

            .window-body .btn-secondary,
            .window-body .btn-primary {
                font-size: var(--font-xs);
                padding: var(--space-1) var(--space-3);
            }
        }

        .mobile-missions-toggle {
            display: none;
            position: fixed;
            bottom: 70px;
            left: var(--space-4);
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: var(--font-xl);
            cursor: pointer;
            z-index: var(--z-content);
            box-shadow: var(--shadow-lg);
            align-items: center;
            justify-content: center;
        }

        .mobile-missions-toggle:hover {
            background: var(--color-primary-hover);
            transform: scale(1.05);
        }

        /* ==========================================
           CONCLUSÃO ÉPICA
           ========================================== */

        .epic-complete {
            text-align: center;
            padding: var(--space-6);
            animation: epicFade 1s ease forwards;
        }

        @keyframes epicFade {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .epic-complete .trophy {
            font-size: 80px;
            margin-bottom: var(--space-4);
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .epic-complete h2 {
            color: var(--color-success);
            font-size: var(--font-xxl);
            margin-bottom: var(--space-4);
        }

        .epic-complete .stats {
            display: flex;
            justify-content: center;
            gap: var(--space-6);
            margin: var(--space-5) 0;
            flex-wrap: wrap;
        }

        .epic-complete .stats .stat {
            background: var(--color-background);
            padding: var(--space-4) var(--space-6);
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            min-width: 120px;
        }

        .epic-complete .stats .stat .number {
            font-size: var(--font-xl);
            font-weight: 700;
            color: var(--text-bright);
            display: block;
        }

        .epic-complete .stats .stat .label {
            font-size: var(--font-xs);
            color: var(--text-muted);
        }

        .epic-complete .story {
            background: var(--color-background);
            padding: var(--space-5);
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            margin: var(--space-5) 0;
            text-align: left;
            line-height: 1.8;
            max-height: 300px;
            overflow-y: auto;
        }

        .epic-complete .story h4 {
            color: var(--text-bright);
            margin-bottom: var(--space-3);
        }

        .epic-complete .story p {
            color: var(--text-secondary);
            margin-bottom: var(--space-2);
        }

        .epic-complete .story .highlight {
            color: var(--color-primary);
            font-weight: 600;
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: var(--z-modal);
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confettiFall 3s ease-in forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <!-- ==========================================
    NOTIFICATION
    ========================================== -->

    <div class="notification" id="notification">
        🎉 Missão Concluída!
    </div>

    <!-- ==========================================
    MOBILE MISSIONS TOGGLE
    ========================================== -->

    <button class="mobile-missions-toggle" id="mobileMissionsToggle" style="display:none;">
        📋
    </button>

    <!-- ==========================================
    MISSIONS PANEL
    ========================================== -->

    <div class="missions-panel" id="missionsPanel">
        <h4>📋 Missões</h4>
        <div id="missionsList"></div>
    </div>

    <!-- ==========================================
    PROGRESSO
    ========================================== -->

    <div class="progress-container">
        <span class="label">📊 Progresso</span>
        <span class="count">
            <span id="progressCount">0</span>
            <span class="total">/ <span id="totalCount">5</span></span>
        </span>
    </div>

    <!-- ==========================================
    DESKTOP
    ========================================== -->

    <main class="desktop" id="desktop">

        <a href="#" class="desktop-icon" data-app="mail">
            <span class="icon">📧</span>
            <span class="label">E-mail</span>
        </a>

        <a href="#" class="desktop-icon" data-app="files">
            <span class="icon">📁</span>
            <span class="label">Arquivos</span>
        </a>

        <a href="#" class="desktop-icon" data-app="messages">
            <span class="icon">💬</span>
            <span class="label">Mensagens</span>
        </a>

        <a href="#" class="desktop-icon" data-app="database">
            <span class="icon">🧬</span>
            <span class="label">Banco de Dados</span>
        </a>

        <a href="#" class="desktop-icon" data-app="evidence">
            <span class="icon">🔍</span>
            <span class="label">Evidências</span>
            <span class="badge-count" id="evidenceBadge">0</span>
        </a>

    </main>

    <!-- ==========================================
    TASKBAR
    ========================================== -->

    <footer class="taskbar">

        <div class="logo-small">
            EVIDENCE
        </div>

        <div class="taskbar-items">
            <span class="taskbar-item active">Desktop</span>
        </div>

        <div class="clock" id="clock">
            Carregando...
        </div>

    </footer>

    <!-- ==========================================
    JANELA (POPUP)
    ========================================== -->

    <div class="window" id="window">

        <div class="window-header">
            <span class="title" id="windowTitle">Aplicativo</span>
            <button class="close-btn" id="closeWindow">✕</button>
        </div>

        <div class="window-body" id="windowBody">
            <p>Conteúdo do aplicativo.</p>
        </div>

    </div>

    <!-- ==========================================
    CONFETTI CONTAINER
    ========================================== -->

    <div class="confetti-container" id="confettiContainer"></div>

    <!-- ==========================================
    SCRIPTS
    ========================================== -->

    <script>
        // ==========================================
        // CONFIGURAÇÕES
        // ==========================================

        const MISSIONS_FILE = '../cases/case001/missions.json';

        // ==========================================
        // RELÓGIO
        // ==========================================

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = hours + ':' + minutes;
        }

        updateClock();
        setInterval(updateClock, 10000);

        // ==========================================
        // ELEMENTOS
        // ==========================================

        const windowEl = document.getElementById('window');
        const windowTitle = document.getElementById('windowTitle');
        const windowBody = document.getElementById('windowBody');
        const closeBtn = document.getElementById('closeWindow');
        const progressCount = document.getElementById('progressCount');
        const totalCount = document.getElementById('totalCount');
        const evidenceBadge = document.getElementById('evidenceBadge');
        const notification = document.getElementById('notification');
        const missionsList = document.getElementById('missionsList');

                renderMissions();
            }

        function renderMissions() {
            missionsList.innerHTML = '';
            missionData.forEach((mission, index) => {
                const isCompleted = completedMissions.has(mission.id);
                const isLocked = !isMissionAvailable(mission);
                const isActive = !isLocked && !isCompleted;

                const div = document.createElement('div');
                div.className = 'mission-item';
                if (isLocked) div.classList.add('locked');
                if (isActive) div.classList.add('active');
                if (isCompleted) div.classList.add('completed');

                const icon = isCompleted ? '✅' : isLocked ? '🔒' : '▶️';
                const statusText = isCompleted ? 'Concluída' : isLocked ? 'Bloqueada' : 'Ativa';

                div.innerHTML = `
                    <span class="icon">${icon}</span>
                    <span>${mission.title}</span>
                    <span class="status">${statusText}</span>
                `;
                missionsList.appendChild(div);
            });
            updateProgress();
        }

        function isMissionAvailable(mission) {
            if (completedMissions.has(mission.id)) return true;
            if (!mission.required || mission.required.length === 0) return true;
            return mission.required.every(req => completedMissions.has(req));
        }

        function checkMissionCompletion(trigger) {
            let anyCompleted = false;
            missionData.forEach(mission => {
                if (completedMissions.has(mission.id)) return;
                if (!isMissionAvailable(mission)) return;

                // Verifica se a missão foi desbloqueada
                if (mission.unlock && trigger === mission.unlock) {
                    completedMissions.add(mission.id);
                    anyCompleted = true;
                    showNotification(`🎉 Missão Concluída: ${mission.title}`);
                }
            });

            if (anyCompleted) {
                renderMissions();
                checkAllComplete();
            }
        }

        function checkAutoComplete() {
            // Verifica se alguma missão já pode ser completada automaticamente
            missionData.forEach(mission => {
                if (completedMissions.has(mission.id)) return;
                if (!isMissionAvailable(mission)) return;

                // Se a missão não tem unlock específico, verifica se o item já foi encontrado
                if (!mission.unlock) {
                    // Missão inicial - sempre disponível
                    if (mission.required.length === 0) {
                        // A missão 1 é completada quando o jogador abre o e-mail
                        // Vamos marcar como completada apenas quando o jogador interagir
                    }
                }
            });
        }

        function checkAllComplete() {
            const allCompleted = missionData.every(m => completedMissions.has(m.id));
            if (allCompleted && !caseComplete) {

                    fetch('../cases/case001/messages.json'),
                    fetch('../cases/case001/evidence.json')

                if (!emailsRes.ok || !messagesRes.ok || !evidenceRes.ok) throw new Error('Erro ao carregar');

                caseData.emails = await emailsRes.json();

        function useFallbackData() {
            emailContent[0] = { from: 'sistema@evidence.com', subject: 'Bem-vindo', date: 'Agora', body: '<p>Bem-vindo!</p>' };
            chatContent[0] = { contact: 'Helena Duarte', messages: [{ from: 'Helena', text: 'Olá!' }] };

            ['Foto_001.png', 'Documento_001.pdf', 'video001.mp4', 'Foto_002.png', 'Documento_002.pdf'].forEach((name, i) => {
                evidenceContent[i] = {
                    title: name,
                    desc: 'Evidência do caso.',
                    location: 'files/' + name
                };
            });

            appContent.mail.body = `
                <h3>Caixa de Entrada</h3>
                <div class="file-list">
                    <div class="file-item" data-email="0"><span class="icon">📩</span><span class="name">Bem-vindo</span><span class="size">Agora</span></div>
                </div>
            `;
            appContent.messages.body = `
                <h3>Conversas</h3>
                <div class="file-list">
                    <div class="file-item" data-chat="0"><span class="icon">👤</span><span class="name">Helena Duarte</span><span class="size">1 mensagem</span></div>
                </div>
            `;
            appContent.evidence.body = `
                <h3>Evidências</h3>
                <div class="file-list">
                    ${['🖼️ Foto_001.png', '📄 Documento_001.pdf', '🎬 video001.mp4', '🖼️ Foto_002.png', '📄 Documento_002.pdf'].map((item, i) =>
                        `<div class="file-item" data-evidence="${i}"><span class="icon">${item.split(' ')[0]}</span><span class="name">${item.split(' ')[1]}</span><span class="size">arquivo</span></div>`
                    ).join('')}
                </div>
            `;
        }

        // ==========================================
        // EVENTOS DE CLICK
        // ==========================================

        document.addEventListener('click', function(e) {
            const target = e.target.closest('.file-item');
            if (!target) return;

            if (target.dataset.folder !== undefined) {
                e.preventDefault();
                openFolder(target.dataset.folder);
                return;
            }

            if (target.dataset.evidence !== undefined) {
                e.preventDefault();
                openEvidence(parseInt(target.dataset.evidence));
                return;
            }

            if (target.dataset.email !== undefined) {
                e.preventDefault();
                openEmail(parseInt(target.dataset.email));
                return;
            }

            if (target.dataset.chat !== undefined) {
                e.preventDefault();
                openChat(parseInt(target.dataset.chat));
                return;
            }
        });

        // ==========================================
        // MOBILE TOGGLE
        // ==========================================

        let missionsVisible = true;

        mobileToggle.addEventListener('click', function() {
            missionsVisible = !missionsVisible;
            missionsPanel.style.display = missionsVisible ? 'block' : 'none';
        });

        // Detectar mobile e mostrar toggle
        function checkMobile() {
            if (window.innerWidth <= 768) {
                mobileToggle.style.display = 'flex';
                missionsPanel.style.display = 'none';
                missionsVisible = false;
            } else {
                mobileToggle.style.display = 'none';
                missionsPanel.style.display = 'block';
                missionsVisible = true;
            }
        }

        window.addEventListener('resize', checkMobile);
        checkMobile();

        // ==========================================
        // INICIALIZAR
        // ==========================================

        async function init() {
            await loadMissions();
            await loadCase();
            setTimeout(() => openApp('mail'), 500);
        }

        init();
    </script>

</body>

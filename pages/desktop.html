<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evidence | Desktop</title>

    <!-- CSS Base -->
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/style.css">

    <!-- Desktop CSS -->
    <style>
        /* ==========================================
           DESKTOP STYLES
           ========================================== */

        body {
            background: radial-gradient(ellipse at center, #0F172A 0%, #020617 100%);
            font-family: var(--font-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ==========================================
           DESKTOP AREA
           ========================================== */

        .desktop {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: var(--space-5);
            padding: var(--space-6);
            overflow-y: auto;
        }

        /* ==========================================
           PROGRESS BAR
           ========================================== */

        .progress-container {
            position: fixed;
            top: var(--space-4);
            right: var(--space-4);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--space-3) var(--space-4);
            font-size: var(--font-sm);
            color: var(--text-secondary);
            z-index: var(--z-content);
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(8px);
            min-width: 160px;
            text-align: center;
        }

        .progress-container .label {
            display: block;
            font-size: var(--font-xs);
            color: var(--text-muted);
            margin-bottom: var(--space-1);
        }

        .progress-container .count {
            font-size: var(--font-xl);
            font-weight: 700;
            color: var(--text-bright);
        }

        .progress-container .count .total {
            color: var(--text-muted);
            font-weight: 400;
        }

        /* ==========================================
           ICON
           ========================================== */

        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90px;
            padding: var(--space-3);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition-fast);
            text-align: center;
            color: var(--text-secondary);
            text-decoration: none;
            border: 1px solid transparent;
            position: relative;
        }

        .desktop-icon:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--color-border);
            transform: translateY(-4px);
        }

        .desktop-icon .icon {
            font-size: 48px;
            margin-bottom: var(--space-2);
            line-height: 1;
        }

        .desktop-icon .label {
            font-size: var(--font-xs);
            color: var(--text-secondary);
            max-width: 80px;
            word-wrap: break-word;
        }

        .desktop-icon .badge-count {
            background: var(--color-danger);
            color: white;
            font-size: 10px;
            font-weight: 700;
            border-radius: 50%;
            padding: 2px 6px;
            position: absolute;
            top: -5px;
            right: -5px;
            display: none;
        }

        /* ==========================================
           TASKBAR
           ========================================== */

        .taskbar {
            height: 56px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--space-4);
            flex-shrink: 0;
        }

        .taskbar .logo-small {
            font-size: var(--font-sm);
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-bright);
        }

        .taskbar .clock {
            font-family: var(--font-mono);
            font-size: var(--font-sm);
            color: var(--text-secondary);
        }

        .taskbar .taskbar-items {
            display: flex;
            gap: var(--space-2);
            align-items: center;
        }

        .taskbar-item {
            padding: var(--space-1) var(--space-3);
            border-radius: var(--radius-sm);
            font-size: var(--font-xs);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition-fast);
            border: 1px solid transparent;
        }

        .taskbar-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--color-border);
            color: var(--text-bright);
        }

        .taskbar-item.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--color-primary);
            color: var(--text-bright);
        }

        /* ==========================================
           WINDOW (Janela)
           ========================================== */

        .window {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            z-index: var(--z-modal);
            display: none;
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn 0.3s ease forwards;
        }

        .window.open {
            display: flex;
        }

        .window-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-3) var(--space-4);
            border-bottom: 1px solid var(--color-border);
            background: rgba(15, 23, 42, 0.5);
            flex-shrink: 0;
        }

        .window-header .title {
            font-size: var(--font-sm);
            font-weight: 600;
            color: var(--text-bright);
        }

        .window-header .close-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: var(--font-lg);
            cursor: pointer;
            transition: var(--transition-fast);
            padding: 0 var(--space-2);
        }

        .window-header .close-btn:hover {
            color: var(--color-danger);
        }

        .window-body {
            padding: var(--space-5);
            overflow-y: auto;
            flex: 1;
            color: var(--text-secondary);
        }

        .window-body h3 {
            color: var(--text-bright);
            margin-bottom: var(--space-3);
        }

        .window-body p {
            margin-bottom: var(--space-2);
            line-height: 1.7;
        }

        .window-body .file-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }

        .window-body .file-item {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-2) var(--space-3);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            transition: var(--transition-fast);
            cursor: pointer;
        }

        .window-body .file-item:hover {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-bright);
        }

        .window-body .file-item .icon {
            font-size: var(--font-lg);
        }

        .window-body .file-item .name {
            flex: 1;
        }

        .window-body .file-item .size {
            font-size: var(--font-xs);
            color: var(--text-muted);
        }

        .window-body .file-item .found-badge {
            font-size: var(--font-xs);
            color: var(--color-success);
        }

        .window-body .btn-secondary {
            background: transparent;
            border: 1px solid var(--color-border);
            color: var(--text-secondary);
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-md);
            font-size: var(--font-sm);
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .window-body .btn-secondary:hover {
            border-color: var(--color-primary);
            color: var(--text-bright);
        }

        /* ==========================================
           SCROLLBAR
           ========================================== */

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: var(--radius-full);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* ==========================================
           RESPONSIVIDADE
           ========================================== */

        @media (max-width: 768px) {
            .desktop {
                gap: var(--space-3);
                padding: var(--space-3);
            }

            .desktop-icon {
                width: 72px;
                padding: var(--space-2);
            }

            .desktop-icon .icon {
                font-size: 36px;
            }

            .desktop-icon .label {
                font-size: 10px;
            }

            .taskbar .logo-small {
                display: none;
            }

            .window {
                width: 95%;
                max-height: 90vh;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            .window-body {
                padding: var(--space-3);
            }

            .progress-container {
                top: var(--space-2);
                right: var(--space-2);
                padding: var(--space-2) var(--space-3);
                font-size: var(--font-xs);
                min-width: 120px;
            }
        }
    </style>
</head>

<body>

    <!-- ==========================================
    PROGRESSO
    ========================================== -->

    <div class="progress-container">
        <span class="label">📊 Progresso</span>
        <span class="count">
            <span id="progressCount">0</span>
            <span class="total">/ <span id="totalCount">5</span></span>
        </span>
    </div>

    <!-- ==========================================
    DESKTOP
    ========================================== -->

    <main class="desktop" id="desktop">

        <!-- Ícone: E-mail -->
        <a href="#" class="desktop-icon" data-app="mail">
            <span class="icon">📧</span>
            <span class="label">E-mail</span>
        </a>

        <!-- Ícone: Arquivos -->
        <a href="#" class="desktop-icon" data-app="files">
            <span class="icon">📁</span>
            <span class="label">Arquivos</span>
        </a>

        <!-- Ícone: Mensagens -->
        <a href="#" class="desktop-icon" data-app="messages">
            <span class="icon">💬</span>
            <span class="label">Mensagens</span>
        </a>

        <!-- Ícone: Banco de Dados -->
        <a href="#" class="desktop-icon" data-app="database">
            <span class="icon">🧬</span>
            <span class="label">Banco de Dados</span>
        </a>

        <!-- Ícone: Evidências -->
        <a href="#" class="desktop-icon" data-app="evidence">
            <span class="icon">🔍</span>
            <span class="label">Evidências</span>
            <span class="badge-count" id="evidenceBadge">0</span>
        </a>

    </main>

    <!-- ==========================================
    TASKBAR
    ========================================== -->

    <footer class="taskbar">

        <div class="logo-small">
            EVIDENCE
        </div>

        <div class="taskbar-items">
            <span class="taskbar-item active">Desktop</span>
        </div>

        <div class="clock" id="clock">
            Carregando...
        </div>

    </footer>

    <!-- ==========================================
    JANELA (POPUP)
    ========================================== -->

    <div class="window" id="window">

        <div class="window-header">
            <span class="title" id="windowTitle">Aplicativo</span>
            <button class="close-btn" id="closeWindow">✕</button>
        </div>

        <div class="window-body" id="windowBody">
            <p>Conteúdo do aplicativo.</p>
        </div>

    </div>

    <!-- ==========================================
    SCRIPTS
    ========================================== -->

    <script>
        // ==========================================
        // RELÓGIO
        // ==========================================

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = hours + ':' + minutes;
        }

        updateClock();
        setInterval(updateClock, 10000);

        // ==========================================
        // ELEMENTOS DA JANELA
        // ==========================================

        const windowEl = document.getElementById('window');
        const windowTitle = document.getElementById('windowTitle');
        const windowBody = document.getElementById('windowBody');
        const closeBtn = document.getElementById('closeWindow');
        const progressCount = document.getElementById('progressCount');
        const totalCount = document.getElementById('totalCount');
        const evidenceBadge = document.getElementById('evidenceBadge');

        // ==========================================
        // FUNÇÃO: FECHAR JANELA
        // ==========================================

        function closeWindow() {
            windowEl.classList.remove('open');
        }

        closeBtn.addEventListener('click', closeWindow);

        // ==========================================
        // DADOS DO CASO (carregados dinamicamente)
        // ==========================================

        let caseData = {
            emails: [],
            messages: [],
            evidence: []
        };

        const emailContent = {};
        const chatContent = {};
        const evidenceContent = {};

        // ==========================================
        // SISTEMA DE PROGRESSO
        // ==========================================

        let foundEvidence = new Set();
        let totalEvidence = 0;

        function markEvidenceFound(evidenceId) {
            if (!foundEvidence.has(evidenceId)) {
                foundEvidence.add(evidenceId);
                updateProgress();
                updateEvidenceBadge();
                checkCaseComplete();
                // Atualiza a lista de evidências se estiver aberta
                if (windowTitle.textContent.includes('Evidências')) {
                    refreshEvidenceList();
                }
            }
        }

        function updateProgress() {
            const found = foundEvidence.size;
            progressCount.textContent = found;
        }

        function updateEvidenceBadge() {
            const found = foundEvidence.size;
            evidenceBadge.textContent = found;
            evidenceBadge.style.display = found > 0 ? 'block' : 'none';
        }

        function checkCaseComplete() {
            const found = foundEvidence.size;
            if (found === totalEvidence && totalEvidence > 0) {
                showCaseComplete();
            }
        }

        function refreshEvidenceList() {
            // Recarregar a lista de evidências com os status atualizados
            if (windowTitle.textContent.includes('Evidências')) {
                const app = appContent.evidence;
                windowTitle.textContent = app.title;
                windowBody.innerHTML = app.body;
            }
        }

        function showCaseComplete() {
            windowTitle.textContent = '🎉 CASO RESOLVIDO!';
            windowBody.innerHTML = `
                <div style="text-align: center; padding: var(--space-6);">
                    <div style="font-size: 64px; margin-bottom: var(--space-4);">🎉</div>
                    <h2 style="color: var(--color-success); font-size: var(--font-xl);">Caso Resolvido!</h2>
                    <p style="margin-top: var(--space-4); font-size: var(--font-lg);">
                        Você encontrou todas as <strong>${foundEvidence.size}</strong> evidências!
                    </p>
                    <p style="color: var(--text-muted); margin-top: var(--space-4); max-width: 400px; margin-left: auto; margin-right: auto;">
                        Parabéns! Você desvendou o desaparecimento de Helena Duarte.
                        A Sigma Corp estava envolvida em lavagem de dinheiro e Helena está
                        viva, escondida em um local seguro.
                    </p>
                    <div style="margin: var(--space-6) 0;">
                        <span class="badge badge-success" style="font-size: var(--font-md); padding: var(--space-2) var(--space-5);">
                            ✅ Caso Concluído
                        </span>
                    </div>
                    <div style="display: flex; gap: var(--space-4); justify-content: center; flex-wrap: wrap;">
                        <button class="btn btn-primary" onclick="closeWindow()">
                            Voltar ao Desktop
                        </button>
                        <button class="btn btn-secondary" onclick="showReport()">
                            📄 Ver Relatório
                        </button>
                    </div>
                </div>
            `;
            windowEl.classList.add('open');
        }

        function showReport() {
            windowTitle.textContent = '📄 Relatório do Caso';
            windowBody.innerHTML = `
                <div style="padding: var(--space-2);">
                    <h3>Relatório Final - Caso #001</h3>
                    <div style="margin-top: var(--space-4);">
                        <p><strong>🕵️ Investigador:</strong> Agente Evidence</p>
                        <p><strong>📅 Data:</strong> ${new Date().toLocaleDateString()}</p>
                        <p><strong>📊 Evidências Encontradas:</strong> ${foundEvidence.size}/${totalEvidence}</p>
                    </div>
                    <div style="border-top: 1px solid var(--color-border); margin-top: var(--space-4); padding-top: var(--space-4);">
                        <h4>Conclusão</h4>
                        <p>Helena Duarte foi encontrada viva em um abrigo na zona rural.
                        A Sigma Corp foi investigada e seus executivos estão sendo processados.
                        O caso foi encerrado com sucesso.</p>
                    </div>
                    <button class="btn-secondary" style="margin-top: var(--space-4);" onclick="closeWindow()">Fechar</button>
                </div>
            `;
            windowEl.classList.add('open');
        }

        // ==========================================
        // CONTEÚDO DOS APLICATIVOS (fallback)
        // ==========================================

        const appContent = {
            mail: {
                title: '📧 E-mail',
                body: `<p>Carregando e-mails...</p>`
            },
            files: {
                title: '📁 Arquivos',
                body: `
                    <h3>Explorador de Arquivos</h3>
                    <div class="file-list">
                        <div class="file-item" data-folder="documents">
                            <span class="icon">📂</span>
                            <span class="name">Documentos</span>
                            <span class="size">12 itens</span>
                        </div>
                        <div class="file-item" data-folder="photos">
                            <span class="icon">📂</span>
                            <span class="name">Fotos</span>
                            <span class="size">8 itens</span>
                        </div>
                        <div class="file-item" data-folder="case001">
                            <span class="icon">📂</span>
                            <span class="name">Caso_001</span>
                            <span class="size">5 itens</span>
                        </div>
                        <div class="file-item" data-file="relatorio">
                            <span class="icon">📄</span>
                            <span class="name">Relatório_Caso001.pdf</span>
                            <span class="size">2.4 MB</span>
                        </div>
                    </div>
                `
            },
            messages: {
                title: '💬 Mensagens',
                body: `<p>Carregando mensagens...</p>`
            },
            database: {
                title: '🧬 Banco de Dados',
                body: `
                    <h3>Registros do Sistema</h3>
                    <div class="file-list">
                        <div class="file-item">
                            <span class="icon">👤</span>
                            <span class="name">Pessoas</span>
                            <span class="size">47 registros</span>
                        </div>
                        <div class="file-item">
                            <span class="icon">🏢</span>
                            <span class="name">Empresas</span>
                            <span class="size">12 registros</span>
                        </div>
                        <div class="file-item">
                            <span class="icon">📋</span>
                            <span class="name">Casos</span>
                            <span class="size">3 registros</span>
                        </div>
                    </div>
                `
            },
            evidence: {
                title: '🔍 Evidências',
                body: `<p>Carregando evidências...</p>`
            }
        };

        // ==========================================
        // FUNÇÃO: ABRIR APP
        // ==========================================

        function openApp(appId) {
            const app = appContent[appId];
            if (!app) return;

            windowTitle.textContent = app.title;
            windowBody.innerHTML = app.body;
            windowEl.classList.add('open');
        }

        // ==========================================
        // EVENTO: CLICK NOS ÍCONES DO DESKTOP
        // ==========================================

        document.querySelectorAll('.desktop-icon').forEach(icon => {
            icon.addEventListener('click', function(e) {
                e.preventDefault();
                const app = this.dataset.app;
                openApp(app);
            });
        });

        // ==========================================
        // FUNÇÕES PARA ABRIR E-MAIL, CHAT, EVIDÊNCIA
        // ==========================================

        function openEmail(emailId) {
            const email = emailContent[emailId];
            if (!email) return;

            windowTitle.textContent = '📧 ' + email.subject;
            windowBody.innerHTML = `
                <div style="margin-bottom: var(--space-4);">
                    <p><strong>De:</strong> ${email.from}</p>
                    <p><strong>Data:</strong> ${email.date}</p>
                </div>
                <div style="border-top: 1px solid var(--color-border); padding-top: var(--space-4);">
                    ${email.body}
                </div>
                <button class="btn-secondary" style="margin-top: var(--space-4);" onclick="closeWindow()">
                    Fechar
                </button>
            `;
            windowEl.classList.add('open');
        }

        function openChat(chatId) {
            const chat = chatContent[chatId];
            if (!chat) return;

            windowTitle.textContent = '💬 ' + chat.contact;
            let html = `<h3>Conversa com ${chat.contact}</h3><div style="margin-top: var(--space-4);">`;
            chat.messages.forEach(msg => {
                html += `
                    <div style="margin-bottom: var(--space-2);">
                        <strong>${msg.from}:</strong> ${msg.text}
                    </div>
                `;
            });
            html += `</div><button class="btn-secondary" style="margin-top: var(--space-4);" onclick="closeWindow()">Fechar</button>`;
            windowBody.innerHTML = html;
            windowEl.classList.add('open');
        }

        function openEvidence(evidenceId) {
            const ev = evidenceContent[evidenceId];
            if (!ev) return;

            // Marcar como encontrada
            markEvidenceFound(evidenceId);

            const filePath = `../cases/case001/files/${ev.title}`;
            const fileExtension = ev.title.split('.').pop().toLowerCase();

            windowTitle.textContent = '🔍 ' + ev.title;

            let content = `
                <h3>${ev.title}</h3>
                <p>${ev.desc}</p>
                <div style="
                    background: var(--color-background);
                    padding: var(--space-4);
                    border-radius: var(--radius-md);
                    margin: var(--space-4) 0;
                    border: 1px solid var(--color-border);
                    min-height: 200px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                ">
            `;

            // Verificar o tipo de arquivo e exibir
            if (fileExtension === 'pdf') {
                content += `
                    <iframe src="${filePath}" style="
                        width: 100%;
                        height: 500px;
                        border: none;
                        border-radius: var(--radius-sm);
                    "></iframe>
                `;
            } else if (fileExtension === 'jpg' || fileExtension === 'jpeg' || fileExtension === 'png' || fileExtension === 'gif' || fileExtension === 'webp') {
                content += `
                    <img src="${filePath}" style="
                        max-width: 100%;
                        max-height: 500px;
                        border-radius: var(--radius-sm);
                        object-fit: contain;
                    ">
                `;
            } else if (fileExtension === 'mp4' || fileExtension === 'webm' || fileExtension === 'mov' || fileExtension === 'avi') {
                content += `
                    <video controls style="
                        width: 100%;
                        max-height: 500px;
                        border-radius: var(--radius-sm);
                    ">
                        <source src="${filePath}" type="video/${fileExtension}">
                        Seu navegador não suporta vídeo.
                    </video>
                `;
            } else if (fileExtension === 'mp3' || fileExtension === 'wav' || fileExtension === 'ogg') {
                content += `
                    <audio controls style="width: 100%;">
                        <source src="${filePath}" type="audio/${fileExtension}">
                        Seu navegador não suporta áudio.
                    </audio>
                `;
            } else if (fileExtension === 'txt' || fileExtension === 'md') {
                content += `
                    <div id="textContent" style="
                        width: 100%;
                        max-height: 400px;
                        overflow-y: auto;
                        background: var(--color-background-dark);
                        padding: var(--space-4);
                        border-radius: var(--radius-sm);
                        font-family: var(--font-mono);
                        font-size: var(--font-sm);
                        color: var(--text-secondary);
                        white-space: pre-wrap;
                    ">Carregando...</div>
                    <script>
                        fetch('${filePath}')
                            .then(res => res.text())
                            .then(text => {
                                document.getElementById('textContent').textContent = text;
                            })
                            .catch(() => {
                                document.getElementById('textContent').textContent = 'Erro ao carregar o arquivo.';
                            });
                    <\/script>
                `;
            } else {
                content += `
                    <div style="text-align: center; color: var(--text-muted);">
                        <p style="font-size: 48px; margin-bottom: var(--space-3);">📂</p>
                        <p>Arquivo: <strong>${ev.title}</strong></p>
                        <p style="font-size: var(--font-sm);">Visualização não disponível para este tipo de arquivo.</p>
                    </div>
                `;
            }

            content += `
                </div>
                <div style="display: flex; gap: var(--space-3); justify-content: flex-end;">
                    <a href="${filePath}" target="_blank" class="btn btn-secondary" style="font-size: var(--font-sm);">
                        📥 Abrir em nova aba
                    </a>
                    <button class="btn btn-secondary" onclick="closeWindow()" style="font-size: var(--font-sm);">
                        Fechar
                    </button>
                </div>
            `;

            windowBody.innerHTML = content;
            windowEl.classList.add('open');
        }

        // ==========================================
        // FUNÇÃO: ABRIR PASTA
        // ==========================================

        function openFolder(folderId) {
            windowTitle.textContent = '📁 ' + folderId;

            const folderContent = {
                documents: `
                    <h3>Documentos</h3>
                    <div class="file-list">
                        <div class="file-item">
                            <span class="icon">📄</span>
                            <span class="name">Contrato.pdf</span>
                            <span class="size">1.2 MB</span>
                        </div>
                        <div class="file-item">
                            <span class="icon">📄</span>
                            <span class="name">Identidade.jpg</span>
                            <span class="size">0.8 MB</span>
                        </div>
                    </div>
                    <button class="btn-secondary" style="margin-top: var(--space-4);" onclick="closeWindow()">
                        Voltar
                    </button>
                `,
                photos: `
                    <h3>Fotos</h3>
                    <div class="file-list">
                        <div class="file-item">
                            <span class="icon">🖼️</span>
                            <span class="name">Foto_001.jpg</span>
                            <span class="size">2.1 MB</span>
                        </div>
                        <div class="file-item">
                            <span class="icon">🖼️</span>
                            <span class="name">Foto_002.jpg</span>
                            <span class="size">1.5 MB</span>
                        </div>
                    </div>
                    <button class="btn-secondary" style="margin-top: var(--space-4);" onclick="closeWindow()">
                        Voltar
                    </button>
                `,
                case001: `
                    <h3>Caso #001 - Desaparecimento</h3>
                    <div class="file-list">
                        <div class="file-item" data-evidence="0">
                            <span class="icon">🖼️</span>
                            <span class="name">Foto_001.png</span>
                            <span class="size">imagem</span>
                        </div>
                        <div class="file-item" data-evidence="1">
                            <span class="icon">📄</span>
                            <span class="name">Documento_001.pdf</span>
                            <span class="size">PDF</span>
                        </div>
                        <div class="file-item" data-evidence="2">
                            <span class="icon">🎬</span>
                            <span class="name">Video_001.mp4</span>
                            <span class="size">vídeo</span>
                        </div>
                        <div class="file-item" data-evidence="3">

                            <span class="size">PDF</span>
                        </div>
                    </div>
                    <button class="btn-secondary" style="margin-top: var(--space-4);" onclick="closeWindow()">
                        Voltar
                    </button>
                `
            };

            windowBody.innerHTML = folderContent[folderId] || `<p>Pasta vazia.</p>`;
            windowEl.classList.add('open');
        }

        // ==========================================
        // CARREGAR DADOS DO CASO #001
        // ==========================================

        async function loadCase() {
            try {
                const emailsRes = await fetch('../cases/case001/emails.json');
                const messagesRes = await fetch('../cases/case001/messages.json');
                const evidenceRes = await fetch('../cases/case001/evidence.json');

                if (!emailsRes.ok || !messagesRes.ok || !evidenceRes.ok) {
                    throw new Error('Erro ao carregar arquivos do caso');
                }

                caseData.emails = await emailsRes.json();
                caseData.messages = await messagesRes.json();
                caseData.evidence = await evidenceRes.json();

                totalEvidence = caseData.evidence.length;
                totalCount.textContent = totalEvidence;

                updateAppContent();
            } catch (error) {
                console.warn('Erro ao carregar caso:', error);
                useFallbackData();
            }
        }

        function updateAppContent() {
            // Gerar lista de e-mails
            let emailList = '';
            caseData.emails.forEach((email, index) => {
                emailList += `
                    <div class="file-item" data-email="${index}">
                        <span class="icon">📩</span>
                        <span class="name">${email.subject}</span>
                        <span class="size">${email.date}</span>
                    </div>
                `;
            });

            // Gerar lista de mensagens
            let messageList = '';
            caseData.messages.forEach((chat, index) => {
                messageList += `
                    <div class="file-item" data-chat="${index}">
                        <span class="icon">👤</span>
                        <span class="name">${chat.contact}</span>
                        <span class="size">${chat.messages.length} mensagens</span>
                    </div>
                `;
            });

            // Gerar lista de evidências
            let evidenceList = '';
            caseData.evidence.forEach((item, index) => {
                const icon = item.type === 'image' ? '🖼️' : item.type === 'audio' ? '🔊' : item.type === 'video' ? '🎬' :
                    '📄';
                const found = foundEvidence.has(index) ? ' ✅' : '';
                evidenceList += `
                    <div class="file-item" data-evidence="${index}">
                        <span class="icon">${icon}</span>
                        <span class="name">${item.title}</span>
                        <span class="size">${item.type}${found}</span>
                    </div>
                `;
            });

            // Atualizar o appContent
            appContent.mail.body = `
                <h3>Caixa de Entrada - Caso #001</h3>
                <div class="file-list">${emailList}</div>
            `;

            appContent.messages.body = `
                <h3>Conversas</h3>
                <div class="file-list">${messageList}</div>
            `;

            appContent.evidence.body = `
                <h3>Evidências do Caso #001</h3>
                <div class="file-list">${evidenceList}</div>
            `;

            // Atualizar os conteúdos
            caseData.emails.forEach((email, index) => {
                emailContent[index] = {
                    from: email.from,
                    subject: email.subject,
                    date: email.date,
                    body: email.body
                };
            });

            caseData.messages.forEach((chat, index) => {
                chatContent[index] = {
                    contact: chat.contact,
                    messages: chat.messages.map(m => ({ from: m.from, text: m.text }))
                };
            });

            caseData.evidence.forEach((item, index) => {
                evidenceContent[index] = {
                    title: item.title,
                    desc: item.description
                };
            });
        }

        function useFallbackData() {
            // Dados de fallback
            totalEvidence = 5;
            totalCount.textContent = totalEvidence;

            emailContent[0] = {
                from: 'sistema@evidence.com',
                subject: 'Bem-vindo ao Evidence',
                date: 'Agora',
                body: '<p>Bem-vindo ao sistema de investigação Evidence.</p>'
            };
            emailContent[1] = {
                from: 'helena.duarte@empresa.com',
                subject: 'Relatório de Caso #001',
                date: 'Ontem',
                body: '<p>O caso #001 está aguardando análise.</p>'
            };

            chatContent[0] = {
                contact: 'Helena Duarte',
                messages: [{ from: 'Helena', text: 'Olá, você recebeu o arquivo?' }]
            };

            evidenceContent[0] = {
                title: 'Foto_001.png',
                desc: 'Última foto de Helena.'
            };
            evidenceContent[1] = {
                title: 'Documento_001.pdf',
                desc: 'Relatório da Sigma.'
            };
            evidenceContent[2] = {
                title: 'Video_001.mp4',
                desc: 'Recriação do momento.'
            };
            evidenceContent[3] = {
                title: 'Foto_002.png',
                desc: 'Fachada da Sigma.'
            };
            evidenceContent[4] = {
                title: 'Documento_002.pdf',
                desc: 'Lista de funcionários.'
            };

            appContent.mail.body = `
                <h3>Caixa de Entrada</h3>
                <div class="file-list">
                    <div class="file-item" data-email="0">
                        <span class="icon">📩</span>
                        <span class="name">Bem-vindo ao Evidence</span>
                        <span class="size">Agora</span>
                    </div>
                    <div class="file-item" data-email="1">
                        <span class="icon">📩</span>
                        <span class="name">Relatório de Caso #001</span>
                        <span class="size">Ontem</span>
                    </div>
                </div>
            `;

            appContent.messages.body = `
                <h3>Conversas</h3>
                <div class="file-list">
                    <div class="file-item" data-chat="0">
                        <span class="icon">👤</span>
                        <span class="name">Helena Duarte</span>
                        <span class="size">1 mensagem</span>
                    </div>
                </div>
            `;

            appContent.evidence.body = `
                <h3>Evidências</h3>
                <div class="file-list">
                    <div class="file-item" data-evidence="0">
                        <span class="icon">🖼️</span>
                        <span class="name">Foto_001.png</span>
                        <span class="size">imagem</span>
                    </div>
                    <div class="file-item" data-evidence="1">
                        <span class="icon">📄</span>
                        <span class="name">Documento_001.pdf</span>
                        <span class="size">PDF</span>
                    </div>
                    <div class="file-item" data-evidence="2">
                        <span class="icon">🎬</span>
                        <span class="name">Video_001.mp4</span>
                        <span class="size">vídeo</span>
                    </div>
                    <div class="file-item" data-evidence="3">
                        <span class="icon">🖼️</span>
                        <span class="name">Foto_002.png</span>
                        <span class="size">imagem</span>
                    </div>
                    <div class="file-item" data-evidence="4">
                        <span class="icon">📄</span>
                        <span class="name">Documento_002.pdf</span>
                        <span class="size">PDF</span>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // EVENTO: CLICK NOS ITENS DINÂMICOS
        // ==========================================

        document.addEventListener('click', function(e) {
            const emailItem = e.target.closest('.file-item[data-email]');
            if (emailItem) {
                const emailId = emailItem.dataset.email;
                openEmail(emailId);
                return;
            }

            const folderItem = e.target.closest('.file-item[data-folder]');
            if (folderItem) {
                const folderId = folderItem.dataset.folder;
                openFolder(folderId);
                return;
            }

            const chatItem = e.target.closest('.file-item[data-chat]');
            if (chatItem) {
                const chatId = chatItem.dataset.chat;
                openChat(chatId);
                return;
            }

            const evidenceItem = e.target.closest('.file-item[data-evidence]');
            if (evidenceItem) {
                const evidenceId = evidenceItem.dataset.evidence;
                openEvidence(evidenceId);
                return;
            }
        });

        // ==========================================
        // INICIALIZAR
        // ==========================================

        loadCase().then(() => {
            setTimeout(() => {
                openApp('mail');
            }, 300);
        });
    </script>

</body>
